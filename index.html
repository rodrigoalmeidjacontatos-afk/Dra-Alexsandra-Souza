<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Dra. Alexsandra Souza · FisioAgenda</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #fafafa;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        #app {
            max-width: 400px;
            width: 100%;
            background-color: white;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.03);
            min-height: 100vh;
            position: relative;
            border-radius: 28px 28px 0 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .main-content {
            flex: 1;
            padding: 20px 18px 90px 18px;
            overflow-y: auto;
            background: white;
        }

        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding: 0 4px;
        }
        .app-header h1 {
            font-size: 1.6rem;
            font-weight: 300;
            color: #2d2d2d;
            letter-spacing: -0.03em;
        }
        .app-header span {
            color: #fa8072;
            font-weight: 400;
        }

        h2 {
            font-size: 1.2rem;
            margin-bottom: 12px;
            color: #2d2d2d;
            font-weight: 500;
            border-left: 4px solid #fa8072;
            padding-left: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .salmão-text { color: #fa8072; }

        .card {
            background: white;
            border-radius: 24px;
            padding: 16px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.02), 0 2px 4px rgba(0, 0, 0, 0.02);
            border: 1px solid #f1f1f1;
            margin-bottom: 20px;
        }

        .badge-status {
            font-size: 0.7rem;
            padding: 4px 8px;
            border-radius: 40px;
            font-weight: 500;
            background: #f2f2f2;
            color: #444;
        }
        .status-confirmado { background: #e6f7e6; color: #2e7d32; }
        .status-pendente { background: #fff8e0; color: #b76e00; }
        .status-cancelado { background: #ffe9e9; color: #b71c1c; }

        .linha-atendimento {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background 0.1s;
        }
        .linha-atendimento:hover {
            background: #fff4f2;
        }
        .linha-atendimento:last-child { border-bottom: none; }

        .horario { font-weight: 600; color: #fa8072; width: 60px; font-size: 0.95rem; }
        .info-paciente { flex: 1; padding: 0 8px; }
        .info-paciente .nome { font-weight: 500; color: #1e1e1e; }
        .info-paciente .servico { font-size: 0.75rem; color: #777; }
        .valor-status { text-align: right; }
        .valor { font-weight: 600; color: #2d2d2d; }

        .card-hoje {
            border: 2px solid #fa8072;
            background: #fffaf8;
            box-shadow: 0 6px 16px rgba(250, 128, 114, 0.15);
            position: relative;
        }
        .tag-hoje {
            position: absolute;
            top: -10px;
            left: 20px;
            background: #fa8072;
            color: white;
            padding: 4px 16px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .resumo-mes {
            display: flex;
            justify-content: space-between;
            background: #fbfbfb;
            border-radius: 32px;
            padding: 18px 12px;
            margin-bottom: 25px;
            border: 1px solid #ffe3df;
            cursor: pointer;
            transition: 0.1s;
        }
        .resumo-mes:active { background: #ffe9e5; }
        .resumo-item { text-align: center; flex: 1; }
        .resumo-valor { font-size: 1.3rem; font-weight: 600; color: #1e1e1e; }
        .resumo-label { font-size: 0.7rem; color: #888; text-transform: uppercase; }

        .tab-bar {
            position: fixed;
            bottom: 0;
            max-width: 400px;
            width: 100%;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 12px 8px 20px;
            border-top: 1px solid #f0e9e7;
            border-radius: 28px 28px 0 0;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.02);
            z-index: 10;
        }
        .tab-item {
            text-align: center;
            font-size: 0.7rem;
            color: #aaa;
            transition: 0.1s;
            cursor: pointer;
            flex: 1;
            font-weight: 500;
        }
        .tab-item.active { color: #fa8072; }
        .tab-item i { font-size: 1.5rem; display: block; margin-bottom: 2px; font-style: normal; }

        .calendario-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .calendario-header button {
            width: 40px;
            height: 40px;
            border-radius: 40px;
            padding: 0;
            font-size: 1.2rem;
            background: #f9f9f9;
            color: #fa8072;
            border: 1px solid #ffe3df;
            box-shadow: none;
        }
        .mes-ano {
            font-size: 1.2rem;
            font-weight: 500;
        }
        .calendario-simples {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            margin-bottom: 20px;
            text-align: center;
        }
        .dia-semana { font-size: 0.7rem; color: #aaa; padding: 6px 0; }
        .dia-numero {
            background: #f9f9f9;
            border-radius: 40px;
            padding: 8px 0;
            font-size: 0.9rem;
            color: #333;
            cursor: pointer;
        }
        .dia-numero.selecionado { background: #fa8072; color: white; }
        .dia-numero.hoje { border: 2px solid #fa8072; font-weight: 600; }

        input, select, textarea, button {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #eee;
            border-radius: 40px;
            font-size: 0.95rem;
            background: white;
            margin-bottom: 12px;
            outline: none;
        }
        input:focus, select:focus, textarea:focus { border-color: #fa8072; }
        button {
            background: #fa8072;
            color: white;
            font-weight: 500;
            border: none;
            cursor: pointer;
            box-shadow: 0 6px 12px rgba(250, 128, 114, 0.2);
        }
        .btn-outline {
            background: white;
            border: 1px solid #fa8072;
            color: #fa8072;
            box-shadow: none;
        }
        .btn-outline-danger {
            background: white;
            border: 1px solid #dc3545;
            color: #dc3545;
        }
        .btn-pequeno { padding: 8px 12px; width: auto; margin: 0; }

        .flex-row {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .paciente-card, .servico-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f1f1f1;
        }

        .whatsapp-btn {
            background: none;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            color: #25D366;
            margin-left: 4px;
        }

        .aba { display: none; }
        .aba.ativa { display: block; }

        .total-sessoes {
            background: #fa8072;
            color: white;
            border-radius: 40px;
            padding: 4px 12px;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .modal-overlay {
            position: fixed;
            top:0; left:0; right:0; bottom:0;
            background: rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }
        .modal-card {
            background: white;
            max-width: 340px;
            width: 90%;
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-height: 70vh;
            overflow-y: auto;
        }
        .acoes-agendamento {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
<div id="app">
    <div class="main-content" id="mainContent"></div>
    <div class="tab-bar" id="tabBar">
        <div class="tab-item" data-aba="dashboard"><i>📋</i>Dashboard</div>
        <div class="tab-item" data-aba="calendario"><i>📅</i>Calendário</div>
        <div class="tab-item" data-aba="pacientes"><i>👤</i>Pacientes</div>
        <div class="tab-item" data-aba="financeiro"><i>💰</i>Financeiro</div>
        <div class="tab-item" data-aba="servicos"><i>⚙️</i>Serviços</div>
    </div>
</div>

<script>
    (function() {
        // ============ DADOS INICIAIS LIMPOS ============
        let pacientes = JSON.parse(localStorage.getItem('fisio_pacientes')) || [];
        let servicos = JSON.parse(localStorage.getItem('fisio_servicos')) || [
            { id: 's1', nome: 'Pilates', valorPadrao: 80.00 },
            { id: 's2', nome: 'Drenagem', valorPadrao: 120.00 },
            { id: 's3', nome: 'Avaliação', valorPadrao: 150.00 },
            { id: 's4', nome: 'Atendimento domiciliar', valorPadrao: 180.00 }
        ];
        let agendamentos = JSON.parse(localStorage.getItem('fisio_agendamentos')) || [];

        function salvarTudo() {
            localStorage.setItem('fisio_pacientes', JSON.stringify(pacientes));
            localStorage.setItem('fisio_servicos', JSON.stringify(servicos));
            localStorage.setItem('fisio_agendamentos', JSON.stringify(agendamentos));
        }

        // ============ ESTADO DA UI ============
        let abaAtiva = 'dashboard';
        let calendarioAno = new Date().getFullYear();
        let calendarioMes = new Date().getMonth();
        let calendarioDiaSelecionado = new Date().toISOString().slice(0,10);

        const mainEl = document.getElementById('mainContent');
        const tabItems = document.querySelectorAll('.tab-item');

        // Helpers
        function formatarMoeda(valor) { return 'R$ ' + valor.toFixed(2).replace('.', ','); }
        function dataBr(data) { return data.split('-').reverse().join('/'); }
        function hojeStr() { return new Date().toISOString().slice(0,10); }

        function render() {
            let html = `<div class="app-header"><h1>Dra.<span> Alexsandra Souza</span></h1></div>`;
            if (abaAtiva === 'dashboard') html += renderDashboard();
            else if (abaAtiva === 'calendario') html += renderCalendario();
            else if (abaAtiva === 'pacientes') html += renderPacientes();
            else if (abaAtiva === 'financeiro') html += renderFinanceiro();
            else if (abaAtiva === 'servicos') html += renderServicos();

            mainEl.innerHTML = html;
            tabItems.forEach(t => t.classList.toggle('active', t.dataset.aba === abaAtiva));

            if (abaAtiva === 'dashboard') hookDashboard();
            else if (abaAtiva === 'calendario') hookCalendario();
            else if (abaAtiva === 'pacientes') hookPacientes();
            else if (abaAtiva === 'financeiro') hookFinanceiro();
            else if (abaAtiva === 'servicos') hookServicos();
        }

        // ============ DASHBOARD ============
        function renderDashboard() {
            const hoje = hojeStr();
            const atendimentosHoje = agendamentos.filter(a => a.data === hoje).sort((a,b)=> a.horario.localeCompare(b.horario));
            const totalHoje = atendimentosHoje.filter(a => a.status === 'confirmado').reduce((acc, a) => acc + a.valor, 0);
            
            const proximos = [];
            const hojeObj = new Date(hoje);
            for (let i=1; i<=5; i++) {
                const dia = new Date(hojeObj);
                dia.setDate(hojeObj.getDate() + i);
                const dataStr = dia.toISOString().slice(0,10);
                const lista = agendamentos.filter(a => a.data === dataStr).sort((a,b)=> a.horario.localeCompare(b.horario));
                if (lista.length) proximos.push({ data: dataStr, lista });
            }

            const mesAtual = hoje.slice(0,7);
            const agendamentosMes = agendamentos.filter(a => a.data.startsWith(mesAtual));
            const totalRecebido = agendamentosMes.filter(a => a.status === 'confirmado').reduce((acc, a) => acc + a.valor, 0);
            const totalPendente = agendamentosMes.filter(a => a.status === 'pendente').reduce((acc, a) => acc + a.valor, 0);
            const qtdAtendimentos = agendamentosMes.length;

            return `
                <div class="resumo-mes" id="resumoMesCard">
                    <div class="resumo-item"><span class="resumo-valor">${formatarMoeda(totalRecebido)}</span><div class="resumo-label">Recebido</div></div>
                    <div class="resumo-item"><span class="resumo-valor">${formatarMoeda(totalPendente)}</span><div class="resumo-label">Pendente</div></div>
                    <div class="resumo-item" id="sessoesClicavel"><span class="resumo-valor">${qtdAtendimentos}</span><div class="resumo-label">Sessões 📋</div></div>
                </div>

                <h2>Hoje · ${dataBr(hoje)} <span class="total-sessoes" id="verPacientesHoje">${atendimentosHoje.length} paciente(s)</span></h2>
                <div class="card card-hoje">
                    <div class="tag-hoje">HOJE</div>
                    ${atendimentosHoje.length ? atendimentosHoje.map(a => renderAtendimentoLinha(a, true)).join('') : '<p class="text-small">Nenhum atendimento hoje</p>'}
                    <div class="flex-row" style="justify-content: space-between; margin-top: 10px;"><span>Total confirmado</span> <strong class="salmão-text">${formatarMoeda(totalHoje)}</strong></div>
                </div>

                <h2>Próximos dias</h2>
                ${proximos.length ? proximos.map(p => `
                    <div class="card card-sm" style="margin-bottom:12px;">
                        <div style="font-weight:600; margin-bottom:6px;">${dataBr(p.data)}</div>
                        ${p.lista.map(a => `<div>${a.horario} · ${a.pacienteNome} · ${a.servicoNome}</div>`).join('')}
                    </div>
                `).join('') : '<p class="text-small">Nenhum agendamento futuro</p>'}
            `;
        }

        function renderAtendimentoLinha(a, comWhats=false) {
            const statusClass = a.status === 'confirmado' ? 'status-confirmado' : (a.status === 'pendente' ? 'status-pendente' : 'status-cancelado');
            const paciente = pacientes.find(p => p.id === a.pacienteId) || { telefone: '' };
            return `
                <div class="linha-atendimento" data-agg-id="${a.id}">
                    <span class="horario">${a.horario}</span>
                    <div class="info-paciente">
                        <div class="nome">${a.pacienteNome}</div>
                        <div class="servico">${a.servicoNome}</div>
                    </div>
                    <div class="valor-status">
                        <div class="valor">${formatarMoeda(a.valor)}</div>
                        <span class="badge-status ${statusClass}">${a.status}</span>
                    </div>
                    ${comWhats && paciente.telefone ? `<button class="whatsapp-btn" data-wpp="${paciente.telefone}" data-nome="${a.pacienteNome}" data-servico="${a.servicoNome}" data-data="${a.data}" data-horario="${a.horario}">📲</button>` : ''}
                </div>
            `;
        }

        function hookDashboard() {
            // CLICAR NO ATENDIMENTO ABRE OPÇÕES DE CANCELAR/REAGENDAR
            document.querySelectorAll('.linha-atendimento').forEach(el => {
                el.addEventListener('click', (e) => {
                    // Se clicou no botão WhatsApp, não abrir o modal
                    if (e.target.classList.contains('whatsapp-btn')) return;
                    
                    const aggId = el.dataset.aggId;
                    const agendamento = agendamentos.find(a => a.id === aggId);
                    if (agendamento) {
                        abrirModalAcoesAgendamento(agendamento);
                    }
                });
            });

            document.querySelectorAll('.whatsapp-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const tel = btn.dataset.wpp;
                    const nome = btn.dataset.nome;
                    const servico = btn.dataset.servico;
                    const data = dataBr(btn.dataset.data);
                    const hora = btn.dataset.horario;
                    const msg = `Olá ${nome}, confirmando seu atendimento de ${servico} no dia ${data} às ${hora}.`;
                    window.open(`https://wa.me/${tel}?text=${encodeURIComponent(msg)}`, '_blank');
                });
            });

            document.getElementById('sessoesClicavel')?.addEventListener('click', ()=>{
                const mesAtual = hojeStr().slice(0,7);
                const agsMes = agendamentos.filter(a => a.data.startsWith(mesAtual));
                if (!agsMes.length) { 
                    alert('Nenhuma sessão neste mês.'); 
                    return; 
                }
                
                const pacMap = new Map();
                agsMes.forEach(a => {
                    if (!pacMap.has(a.pacienteId)) {
                        pacMap.set(a.pacienteId, { nome: a.pacienteNome, servicos: [], total: 0 });
                    }
                    const entry = pacMap.get(a.pacienteId);
                    entry.servicos.push(`${a.servicoNome} (${dataBr(a.data)} ${a.horario})`);
                    if (a.status === 'confirmado') entry.total += a.valor;
                });

                let detalhe = '<div class="modal-card"><h3>Sessões do mês</h3>';
                for (let [id, p] of pacMap.entries()) {
                    detalhe += `<p><strong>${p.nome}</strong> (total ${formatarMoeda(p.total)})<br>`;
                    detalhe += p.servicos.map(s => `• ${s}`).join('<br>') + '</p><hr>';
                }
                detalhe += '<button class="btn-outline" id="fecharModalDetalhe">Fechar</button></div>';
                
                const overlay = document.createElement('div');
                overlay.className = 'modal-overlay';
                overlay.innerHTML = detalhe;
                mainEl.appendChild(overlay);
                document.getElementById('fecharModalDetalhe').addEventListener('click', ()=> overlay.remove());
            });

            document.getElementById('verPacientesHoje')?.addEventListener('click', ()=>{
                const hoje = hojeStr();
                const pacientesHojeIds = [...new Set(agendamentos.filter(a => a.data === hoje).map(a => a.pacienteId))];
                const nomes = pacientes.filter(p => pacientesHojeIds.includes(p.id)).map(p => p.nome).join(', ');
                alert(`Pacientes de hoje:\n${nomes || 'nenhum'}`);
            });
        }

        // ============ MODAL DE AÇÕES DO AGENDAMENTO ============
        function abrirModalAcoesAgendamento(agendamento) {
            const modalHtml = `
                <div class="modal-overlay" id="modalAcoes">
                    <div class="modal-card">
                        <h3>${agendamento.pacienteNome}</h3>
                        <p><strong>${agendamento.servicoNome}</strong> - ${formatarMoeda(agendamento.valor)}</p>
                        <p>Data: ${dataBr(agendamento.data)} às ${agendamento.horario}</p>
                        <p>Status: <span class="badge-status ${agendamento.status === 'confirmado' ? 'status-confirmado' : agendamento.status === 'pendente' ? 'status-pendente' : 'status-cancelado'}">${agendamento.status}</span></p>
                        
                        <div class="acoes-agendamento">
                            <button id="cancelarAgendamentoBtn" class="btn-outline-danger btn-pequeno">❌ Cancelar</button>
                            <button id="reagendarAgendamentoBtn" class="btn-outline btn-pequeno">📅 Reagendar</button>
                            <button id="editarCompletoBtn" class="btn-outline btn-pequeno">✎ Editar</button>
                        </div>
                        <button class="btn-outline" id="fecharModalAcoes" style="margin-top:10px;">Fechar</button>
                    </div>
                </div>
            `;
            
            mainEl.insertAdjacentHTML('beforeend', modalHtml);
            
            document.getElementById('cancelarAgendamentoBtn').addEventListener('click', () => {
                if (confirm(`Cancelar atendimento de ${agendamento.pacienteNome}?`)) {
                    agendamento.status = 'cancelado';
                    salvarTudo();
                    document.getElementById('modalAcoes').remove();
                    render();
                }
            });
            
            document.getElementById('reagendarAgendamentoBtn').addEventListener('click', () => {
                // Abrir modal para selecionar nova data
                const reagendarHtml = `
                    <div class="modal-overlay" id="modalReagendar">
                        <div class="modal-card">
                            <h3>Reagendar ${agendamento.pacienteNome}</h3>
                            <p>Data atual: ${dataBr(agendamento.data)}</p>
                            <input type="date" id="novaData" value="${agendamento.data}">
                            <input type="time" id="novoHorario" value="${agendamento.horario}">
                            <div class="flex-row">
                                <button id="salvarReagendamento">Salvar</button>
                                <button class="btn-outline" id="cancelarReagendamento">Cancelar</button>
                            </div>
                        </div>
                    </div>
                `;
                
                document.getElementById('modalAcoes').remove();
                mainEl.insertAdjacentHTML('beforeend', reagendarHtml);
                
                document.getElementById('salvarReagendamento').addEventListener('click', () => {
                    const novaData = document.getElementById('novaData').value;
                    const novoHorario = document.getElementById('novoHorario').value;
                    
                    if (novaData && novoHorario) {
                        agendamento.data = novaData;
                        agendamento.horario = novoHorario;
                        // Manter o mesmo status (não alterar)
                        salvarTudo();
                        document.getElementById('modalReagendar').remove();
                        render();
                    }
                });
                
                document.getElementById('cancelarReagendamento').addEventListener('click', () => {
                    document.getElementById('modalReagendar').remove();
                });
            });
            
            document.getElementById('editarCompletoBtn').addEventListener('click', () => {
                document.getElementById('modalAcoes').remove();
                window.editarAgendamento(agendamento.id);
            });
            
            document.getElementById('fecharModalAcoes').addEventListener('click', () => {
                document.getElementById('modalAcoes').remove();
            });
        }

        // ============ CALENDÁRIO ============
        function renderCalendario() {
            const primeiroDia = new Date(calendarioAno, calendarioMes, 1);
            const ultimoDia = new Date(calendarioAno, calendarioMes + 1, 0).getDate();
            const dias = Array.from({ length: ultimoDia }, (_, i) => i + 1);
            const nomeMes = primeiroDia.toLocaleString('pt-BR', { month: 'long' });

            let html = `<div class="calendario-header">`;
            html += `<button id="mesAnterior">←</button>`;
            html += `<span class="mes-ano">${nomeMes} ${calendarioAno}</span>`;
            html += `<button id="proximoMes">→</button>`;
            html += `</div>`;

            html += `<div class="calendario-simples">`;
            ['D','S','T','Q','Q','S','S'].forEach(d => html += `<div class="dia-semana">${d}</div>`);
            for (let i=0; i<primeiroDia.getDay(); i++) html += `<div></div>`;
            dias.forEach(d => {
                const dataStr = `${calendarioAno}-${String(calendarioMes+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const selecionado = dataStr === calendarioDiaSelecionado ? 'selecionado' : '';
                const hojeClass = dataStr === hojeStr() ? 'hoje' : '';
                html += `<div class="dia-numero ${selecionado} ${hojeClass}" data-data="${dataStr}">${d}</div>`;
            });
            html += `</div>`;

            const atendimentosDia = agendamentos.filter(a => a.data === calendarioDiaSelecionado).sort((a,b)=> a.horario.localeCompare(b.horario));
            html += `<h2>${dataBr(calendarioDiaSelecionado)}</h2>`;
            html += `<button id="btnNovoAgendamento" class="btn-outline" style="margin-bottom:12px;">+ Novo Agendamento</button>`;
            html += `<div class="card">`;
            if (atendimentosDia.length) {
                atendimentosDia.forEach(a => {
                    html += renderAtendimentoLinha(a, false);
                    html += `<div class="flex-row" style="gap:4px; justify-content:flex-end;">
                        <button class="btn-outline btn-pequeno editar-agg" data-id="${a.id}">✎ Editar</button> 
                        <button class="btn-outline btn-pequeno excluir-agg" data-id="${a.id}">🗑️ Excluir</button>
                    </div>`;
                });
            } else html += '<p class="text-small">Nenhum atendimento neste dia.</p>';
            html += `</div>`;

            return html;
        }

        function hookCalendario() {
            document.getElementById('mesAnterior')?.addEventListener('click', ()=>{
                if (calendarioMes === 0) {
                    calendarioMes = 11;
                    calendarioAno--;
                } else calendarioMes--;
                render();
            });
            document.getElementById('proximoMes')?.addEventListener('click', ()=>{
                if (calendarioMes === 11) {
                    calendarioMes = 0;
                    calendarioAno++;
                } else calendarioMes++;
                render();
            });

            document.querySelectorAll('.dia-numero').forEach(el => {
                el.addEventListener('click', (e) => {
                    calendarioDiaSelecionado = el.dataset.data;
                    render();
                });
            });
            document.getElementById('btnNovoAgendamento')?.addEventListener('click', ()=>{
                window.openFormAgendamento(calendarioDiaSelecionado);
            });
            document.querySelectorAll('.editar-agg').forEach(b => {
                b.addEventListener('click', (e) => {
                    e.stopPropagation();
                    window.editarAgendamento(b.dataset.id);
                });
            });
            document.querySelectorAll('.excluir-agg').forEach(b => {
                b.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if(confirm('Remover agendamento?')) {
                        agendamentos = agendamentos.filter(a => a.id !== b.dataset.id);
                        salvarTudo(); 
                        render();
                    }
                });
            });
            
            // Também permitir clicar na linha para ações rápidas
            document.querySelectorAll('.linha-atendimento').forEach(el => {
                el.addEventListener('click', (e) => {
                    if (e.target.classList.contains('btn-outline')) return;
                    const aggId = el.dataset.aggId;
                    const agendamento = agendamentos.find(a => a.id === aggId);
                    if (agendamento) {
                        abrirModalAcoesAgendamento(agendamento);
                    }
                });
            });
        }

        // ============ PACIENTES ============
        function renderPacientes() {
            return `
                <h2>Pacientes</h2>
                <button id="novoPacienteBtn" class="btn-outline">+ Novo paciente</button>
                <input type="text" id="buscaPaciente" placeholder="Buscar por nome..." class="search-box" style="margin-top:12px;" />
                <div class="card" id="listaPacientesContainer">
                    ${pacientes.map(p => `
                        <div class="paciente-card" data-id="${p.id}">
                            <div><strong>${p.nome}</strong><br><span class="text-small">${p.telefone || 'sem telefone'}</span></div>
                            <div class="flex-row">
                                <button class="btn-outline btn-pequeno editar-paciente" data-id="${p.id}">✎</button>
                                <button class="btn-outline btn-pequeno excluir-paciente" data-id="${p.id}">🗑️</button>
                                <button class="btn-outline btn-pequeno historico-paciente" data-id="${p.id}">📋</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function hookPacientes() {
            document.getElementById('novoPacienteBtn')?.addEventListener('click', ()=>{
                const nome = prompt('Nome do paciente:');
                if (!nome) return;
                const tel = prompt('Telefone (com código, ex: 5511999999999):') || '';
                pacientes.push({ id: 'p'+Date.now(), nome, telefone: tel });
                salvarTudo(); 
                render();
            });

            document.getElementById('buscaPaciente')?.addEventListener('input', (e) => {
                const termo = e.target.value.toLowerCase();
                document.querySelectorAll('.paciente-card').forEach(el => {
                    const nome = el.querySelector('strong')?.innerText.toLowerCase() || '';
                    el.style.display = nome.includes(termo) ? 'flex' : 'none';
                });
            });

            document.querySelectorAll('.editar-paciente').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = btn.dataset.id;
                    const pac = pacientes.find(p => p.id === id);
                    if (!pac) return;
                    const novoNome = prompt('Novo nome:', pac.nome);
                    if (novoNome) pac.nome = novoNome;
                    const novoTel = prompt('Telefone:', pac.telefone);
                    if (novoTel !== null) pac.telefone = novoTel;
                    salvarTudo(); 
                    render();
                });
            });

            document.querySelectorAll('.excluir-paciente').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = btn.dataset.id;
                    
                    const temAgendamento = agendamentos.some(a => String(a.pacienteId) === String(id));
                    
                    if (temAgendamento) {
                        alert('Este paciente possui agendamentos. Exclua os agendamentos primeiro (na aba Calendário).');
                        return;
                    }
                    
                    if (confirm('Remover paciente?')) {
                        pacientes = pacientes.filter(p => String(p.id) !== String(id));
                        salvarTudo(); 
                        render();
                    }
                });
            });

            document.querySelectorAll('.historico-paciente').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = btn.dataset.id;
                    const atendimentosPaciente = agendamentos.filter(a => String(a.pacienteId) === String(id)).sort((a,b)=> a.data.localeCompare(b.data));
                    const total = atendimentosPaciente.filter(a => a.status === 'confirmado').reduce((acc, a) => acc + a.valor, 0);
                    
                    if (atendimentosPaciente.length === 0) {
                        alert('Este paciente não possui histórico de atendimentos.');
                        return;
                    }
                    
                    let msg = `Histórico de atendimentos:\n`;
                    atendimentosPaciente.forEach(a => msg += `${dataBr(a.data)} ${a.horario} - ${a.servicoNome} ${formatarMoeda(a.valor)} [${a.status}]\n`);
                    msg += `\nTotal investido: ${formatarMoeda(total)}`;
                    alert(msg);
                });
            });
        }

        // ============ FINANCEIRO ============
        function renderFinanceiro() {
            const meses = {};
            agendamentos.forEach(a => {
                const mes = a.data.slice(0,7);
                if (!meses[mes]) meses[mes] = { confirmado:0, pendente:0, cancelado:0, itens: [] };
                meses[mes][a.status] += a.valor;
                meses[mes].itens.push(a);
            });
            
            const sorted = Object.keys(meses).sort().reverse();
            
            let html = `<h2>Financeiro interativo</h2>`;
            
            if (sorted.length === 0) {
                html += `<div class="card"><p class="text-small">Nenhum dado financeiro disponível. Crie agendamentos para visualizar.</p></div>`;
                return html;
            }
            
            html += `<select id="filtroMesFinanceiro" style="margin-bottom:20px;">`;
            sorted.forEach(m => html += `<option value="${m}">${m.replace('-','/')}</option>`);
            html += `</select>`;
            html += `<div id="financeiroDetalhe"></div>`;
            return html;
        }

        function hookFinanceiro() {
            const select = document.getElementById('filtroMesFinanceiro');
            if (!select) return;
            
            function atualizarDetalhe(mes) {
                const ags = agendamentos.filter(a => a.data.startsWith(mes));
                const conf = ags.filter(a => a.status==='confirmado').reduce((acc,a)=>acc+a.valor,0);
                const pend = ags.filter(a => a.status==='pendente').reduce((acc,a)=>acc+a.valor,0);
                const canc = ags.filter(a => a.status==='cancelado').reduce((acc,a)=>acc+a.valor,0);
                
                let html = `<div class="card">`;
                html += `<div class="flex-row" style="justify-content:space-between;"><span>✅ Confirmados</span> <strong>${formatarMoeda(conf)}</strong></div>`;
                html += `<div class="flex-row" style="justify-content:space-between;"><span>⏳ Pendentes</span> <strong>${formatarMoeda(pend)}</strong></div>`;
                html += `<div class="flex-row" style="justify-content:space-between;"><span>❌ Cancelados</span> <strong>${formatarMoeda(canc)}</strong></div>`;
                
                if (ags.length > 0) {
                    html += `<hr><p class="text-small">Clique nos agendamentos para editar valores:</p>`;
                    ags.forEach(a => {
                        html += `<div class="flex-row" style="justify-content:space-between; padding:5px 0;">
                            <span>${a.pacienteNome} - ${a.servicoNome}</span>
                            <span><strong>${formatarMoeda(a.valor)}</strong> 
                            <button class="btn-pequeno editar-valor-agg" data-id="${a.id}" style="margin-left:5px;">✎</button></span>
                        </div>`;
                    });
                }
                
                html += `</div>`;
                document.getElementById('financeiroDetalhe').innerHTML = html;

                document.querySelectorAll('.editar-valor-agg').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const id = btn.dataset.id;
                        const agg = agendamentos.find(a => a.id === id);
                        if (!agg) return;
                        const novoValor = parseFloat(prompt(`Novo valor para ${agg.pacienteNome} - ${agg.servicoNome}:`, agg.valor));
                        if (!isNaN(novoValor) && novoValor >= 0) {
                            agg.valor = novoValor;
                            salvarTudo();
                            atualizarDetalhe(mes);
                        }
                    });
                });
            }
            
            atualizarDetalhe(select.value);
            select.addEventListener('change', (e) => atualizarDetalhe(e.target.value));
        }

        // ============ SERVIÇOS ============
        function renderServicos() {
            return `
                <h2>Serviços</h2>
                <button id="novoServicoBtn">+ Criar novo serviço</button>
                <div class="card">
                    ${servicos.map(s => `
                        <div class="servico-card">
                            <span><strong>${s.nome}</strong> ${formatarMoeda(s.valorPadrao)}</span>
                            <span>
                                <button class="btn-outline btn-pequeno editar-serv" data-id="${s.id}">✎</button>
                                <button class="btn-outline btn-pequeno excluir-serv" data-id="${s.id}">🗑️</button>
                            </span>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function hookServicos() {
            document.getElementById('novoServicoBtn')?.addEventListener('click', ()=>{
                const nome = prompt('Nome do serviço:');
                if (!nome) return;
                const valor = parseFloat(prompt('Valor padrão (ex: 80):'));
                if (isNaN(valor)) return;
                servicos.push({ id: 's'+Date.now(), nome, valorPadrao: valor });
                salvarTudo(); 
                render();
            });
            
            document.querySelectorAll('.editar-serv').forEach(b => {
                b.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = b.dataset.id;
                    const serv = servicos.find(s => s.id === id);
                    if (!serv) return;
                    const novoNome = prompt('Novo nome:', serv.nome);
                    if (novoNome) serv.nome = novoNome;
                    const novoValor = parseFloat(prompt('Novo valor:', serv.valorPadrao));
                    if (!isNaN(novoValor)) serv.valorPadrao = novoValor;
                    salvarTudo(); 
                    render();
                });
            });
            
            document.querySelectorAll('.excluir-serv').forEach(b => {
                b.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (confirm('Excluir serviço?')) {
                        servicos = servicos.filter(s => s.id !== b.dataset.id);
                        salvarTudo(); 
                        render();
                    }
                });
            });
        }

        // ============ FORMULÁRIO AGENDAMENTO (CORRIGIDO - SEM DUPLICIDADE) ============
        window.openFormAgendamento = (data, agendamentoExistente = null) => {
            if (pacientes.length === 0) {
                alert('Cadastre um paciente primeiro na aba Pacientes.');
                return;
            }
            if (servicos.length === 0) {
                alert('Cadastre um serviço primeiro na aba Serviços.');
                return;
            }
            
            const isEdicao = agendamentoExistente !== null;
            const titulo = isEdicao ? 'Editar Agendamento' : 'Novo Agendamento';
            
            const pacienteOptions = pacientes.map(p => `<option value="${p.id}" ${isEdicao && p.id === agendamentoExistente.pacienteId ? 'selected' : ''}>${p.nome}</option>`).join('');
            const servicoOptions = servicos.map(s => `<option value="${s.id}" data-valor="${s.valorPadrao}" ${isEdicao && s.id === agendamentoExistente.servicoId ? 'selected' : ''}>${s.nome} - ${formatarMoeda(s.valorPadrao)}</option>`).join('');
            
            const formHtml = `
                <div class="modal-overlay" id="modalForm">
                    <div class="modal-card">
                        <h3>${titulo}</h3>
                        <input type="date" id="formData" value="${isEdicao ? agendamentoExistente.data : data}">
                        <input type="time" id="formHora" value="${isEdicao ? agendamentoExistente.horario : '14:00'}">
                        <select id="formPaciente"><option value="">Selecione paciente</option>${pacienteOptions}</select>
                        <select id="formServico"><option value="">Selecione serviço</option>${servicoOptions}</select>
                        <input type="number" id="formValor" step="0.01" placeholder="Valor" value="${isEdicao ? agendamentoExistente.valor : ''}">
                        <select id="formStatus">
                            <option value="confirmado" ${isEdicao && agendamentoExistente.status === 'confirmado' ? 'selected' : ''}>Confirmado</option>
                            <option value="pendente" ${isEdicao && agendamentoExistente.status === 'pendente' ? 'selected' : ''}>Pendente</option>
                            <option value="cancelado" ${isEdicao && agendamentoExistente.status === 'cancelado' ? 'selected' : ''}>Cancelado</option>
                        </select>
                        <textarea id="formObs" placeholder="Observação">${isEdicao ? agendamentoExistente.obs || '' : ''}</textarea>
                        <div class="flex-row">
                            <button id="salvarAgendamento">Salvar</button>
                            <button class="btn-outline" id="cancelarForm">Cancelar</button>
                        </div>
                    </div>
                </div>
            `;
            
            mainEl.insertAdjacentHTML('beforeend', formHtml);
            
            document.getElementById('formServico').addEventListener('change', (e) => {
                const select = e.target;
                const opt = select.options[select.selectedIndex];
                if (opt && opt.dataset.valor && !isEdicao) {
                    document.getElementById('formValor').value = opt.dataset.valor;
                }
            });
            
            document.getElementById('salvarAgendamento').addEventListener('click', ()=>{
                const pacienteId = document.getElementById('formPaciente').value;
                if (!pacienteId) { alert('Selecione um paciente'); return; }
                
                const servicoId = document.getElementById('formServico').value;
                if (!servicoId) { alert('Selecione um serviço'); return; }
                
                const paciente = pacientes.find(p => p.id === pacienteId);
                const servico = servicos.find(s => s.id === servicoId);
                
                if (isEdicao) {
                    // ATUALIZAR O AGENDAMENTO EXISTENTE (sem criar novo)
                    agendamentoExistente.data = document.getElementById('formData').value;
                    agendamentoExistente.horario = document.getElementById('formHora').value;
                    agendamentoExistente.pacienteId = paciente.id;
                    agendamentoExistente.pacienteNome = paciente.nome;
                    agendamentoExistente.servicoId = servico.id;
                    agendamentoExistente.servicoNome = servico.nome;
                    agendamentoExistente.valor = parseFloat(document.getElementById('formValor').value) || 0;
                    agendamentoExistente.status = document.getElementById('formStatus').value;
                    agendamentoExistente.obs = document.getElementById('formObs').value;
                } else {
                    // CRIAR NOVO
                    const novo = {
                        id: 'a'+Date.now(),
                        data: document.getElementById('formData').value,
                        horario: document.getElementById('formHora').value,
                        pacienteId: paciente.id,
                        pacienteNome: paciente.nome,
                        servicoId: servico.id,
                        servicoNome: servico.nome,
                        valor: parseFloat(document.getElementById('formValor').value) || 0,
                        status: document.getElementById('formStatus').value,
                        obs: document.getElementById('formObs').value,
                    };
                    agendamentos.push(novo);
                }
                
                salvarTudo();
                document.getElementById('modalForm').remove();
                render();
            });
            
            document.getElementById('cancelarForm').addEventListener('click', ()=>{
                document.getElementById('modalForm').remove();
            });
        };

        window.editarAgendamento = (id) => {
            const agg = agendamentos.find(a => a.id === id);
            if (!agg) return;
            window.openFormAgendamento(agg.data, agg);
        };

        // Inicialização
        tabItems.forEach(tab => {
            tab.addEventListener('click', () => {
                abaAtiva = tab.dataset.aba;
                render();
            });
        });

        // Limpar dados antigos
        const storedAgendamentos = localStorage.getItem('fisio_agendamentos');
        if (storedAgendamentos) {
            try {
                const parsed = JSON.parse(storedAgendamentos);
                if (parsed.some(a => a.data && a.data.includes('2025'))) {
                    agendamentos = [];
                    salvarTudo();
                }
            } catch (e) {
                agendamentos = [];
            }
        }
        
        salvarTudo();
        render();
    })();
</script>
</body>
</html>
